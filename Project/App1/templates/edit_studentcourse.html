<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Course Data | Fees Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#be123c; --rose-mid:#e11d48; --rose-pale:#fff1f2; --rose-soft:#fecdd3;
  --bg:#fffbf8; --surface:#ffffff; --ink:#1c1015; --muted:#9c6b72; --border-soft:#fecdd3;
  --font-head:'Plus Jakarta Sans',sans-serif; --font-body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{ font-family:var(--font-body); background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }
.navbar { background: #4c0519; padding: 14px 56px; display: flex; justify-content: space-between; align-items: center; }
.nav-brand { color: #fff; font-family: var(--font-head); font-weight: 800; text-decoration: none; }
.nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size:0.88rem; font-weight:600;}
.page-header{ background:linear-gradient(130deg,#881337,var(--rose-mid),#f43f5e); padding:30px 56px; color:#fff;}
.content{ flex:1; max-width:550px; width:100%; margin:0 auto; padding:40px 20px; }
.form-card { background: var(--surface); border:1.5px solid var(--border-soft); border-radius:16px; padding:28px; box-shadow:0 10px 30px rgba(190,18,60,0.05); }
.form-title { font-family:var(--font-head); font-size:1.3rem; font-weight:800; margin-bottom:20px; color:var(--ink); text-align:center;}
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:0.82rem; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase;}
.form-group input { width:100%; padding:11px 16px; border:1.5px solid var(--border-soft); border-radius:10px; font-size:0.9rem; outline:none; transition:all 0.2s; }
.form-group input:focus { border-color:var(--rose-mid); box-shadow:0 0 0 3px rgba(225,29,72,0.1); }
.form-group input[readonly] { background: #f3f4f6; color: #6b7280; cursor: not-allowed; border-color: #e5e7eb;}
.btn-submit { width:100%; border:none; background:var(--rose-mid); color:#fff; padding:12px; border-radius:10px; font-family:var(--font-head); font-weight:700; font-size:0.9rem; cursor:pointer; transition:background 0.2s; margin-top:10px;}
.btn-submit:hover { background:var(--rose); }
.msg-box { text-align:center; padding:16px; background:var(--rose-pale); border:1px solid var(--rose-soft); color:var(--rose); border-radius:10px; margin-bottom:18px; font-weight:600;}
.back-link { display:block; text-align:center; color:var(--muted); text-decoration:none; font-size:0.85rem; margin-top:14px; font-weight:600;}
.page-footer{ background:#881337; color:rgba(255,255,255,0.55); text-align:center; padding:16px; font-size:0.8rem; margin-top:auto;}
</style>
</head>
<body>

<nav class="navbar">
  <a href="#" class="nav-brand">🎓 FeesPro</a>
  <div class="nav-links"><a href="../show_student/">View All Students</a></div>
</nav>

<div class="page-header">
  <h2 style="font-family:var(--font-head); font-size:1.3rem;">Edit Course Details</h2>
</div>

<div class="content">
  {% if msg %}
    <div class="msg-box">
      {{msg}}
      <a href="../show_student/" class="back-link" style="margin-top:6px;">← Back to Directory</a>
    </div>
  {% endif %}

  {% if data %}
  <div class="form-card">
    <div class="form-title">Modify Course Data</div>
    <form action="../edit_studentcourse1/" method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Student Course ID (Read Only)</label>
          <input type="text" name="T0" value="{{data.student_id}}" readonly>
        </div>
        <div class="form-group">
          <label>Course Name</label>
          <input type="text" name="T1" value="{{data.course_name}}">
        </div>
        <div class="form-group">
          <label>Joining Date</label>
          <input type="text" name="T2" value="{{data.join_date}}">
        </div>
        <div class="form-group">
          <label>Fee Amount (₹)</label>
          <input type="text" name="T3" value="{{data.fee}}">
        </div>
        <div class="form-group">
          <label>Remarks</label>
          <input type="text" name="T4" value="{{data.remarks}}">
        </div>

        <button type="submit" class="btn-submit">Update Course Record</button>
    </form>
  </div>
  {% endif %}
</div>

<div class="page-footer">&copy; 2026 Student Fees Management. All rights reserved.</div>
</body>
</html>
