<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password | Student Fees Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#c8e6f5;
    --blue-mid:#a8d8f0;
    --blue-dark:#1a6fa8;
    --orange:#e8571a;
    --orange-light:#f07a3a;
    --white:#ffffff;
    --ink:#1a2230;
    --muted:#5a6a78;
    --border:#c0ddef;
    --font-head:'Fredoka One', cursive;
    --font-body:'Nunito', sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;overflow-x:hidden;}

  body{
    font-family:var(--font-body);
    background:var(--blue);
    color:var(--ink);
    line-height:1.55;
    font-size:1rem;
    min-height:100vh;
  }

  /* ── TOPBAR ── */
  .topbar{
    background:var(--white);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    padding:12px 32px;
    box-shadow:0 2px 12px rgba(26,111,168,0.1);
    position:sticky;
    top:0;
    z-index:100;
  }

  .brand{
    display:flex;align-items:center;gap:8px;
    font-family:var(--font-head);
    font-size:1.05rem;
    color:var(--blue-dark);
  }

  .brand .mark{
    width:32px;height:32px;
    background:var(--orange);
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    font-size:0.85rem;
    font-family:var(--font-head);
  }

  .topbar nav a{
    text-decoration:none;
    font-weight:800;
    font-size:0.88rem;
    color:var(--blue-dark);
    padding:8px 16px;
    border-radius:20px;
  }

  .topbar nav a:hover{color:var(--orange);}

  /* ── WRAP ── */
  .wrap{
    max-width:460px;
    margin:0 auto;
    padding:36px 20px 40px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    min-height:calc(100vh - 60px);
  }

  .card{
    width:100%;
    background:var(--white);
    border-radius:18px;
    padding:28px 30px;
    box-shadow:0 8px 22px rgba(26,111,168,0.12);
  }

  .card-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
  }

  .card-head .ic{
    width:38px;height:38px;
    background:var(--blue);
    border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;
    flex-shrink:0;
  }

  .card-head h1{
    font-family:var(--font-head);
    font-size:1.35rem;
    color:var(--blue-dark);
  }

  .email-tag{
    display:inline-block;
    background:var(--blue);
    color:var(--blue-dark);
    font-weight:700;
    font-size:0.85rem;
    padding:7px 14px;
    border-radius:20px;
    margin-bottom:20px;
  }

  /* ── FIELDS ── */
  .field-group{margin-bottom:16px;}

  .field-group label{
    display:block;
    font-size:0.8rem;
    font-weight:800;
    text-transform:uppercase;
    color:var(--blue-dark);
    margin-bottom:6px;
    letter-spacing:0.03em;
  }

  .field-group input[type="password"]{
    width:100%;
    font-family:var(--font-body);
    font-size:0.98rem;
    padding:11px 14px;
    border:1.5px solid var(--border);
    border-radius:10px;
    background:var(--white);
    color:var(--ink);
    outline:none;
    transition:border-color 0.2s;
  }

  .field-group input[type="password"]:focus{border-color:var(--orange);}

  .btn-fill{
    width:100%;
    background:var(--orange);
    color:#fff;
    border:none;
    padding:13px 0;
    border-radius:30px;
    font-weight:900;
    font-size:1rem;
    font-family:var(--font-body);
    cursor:pointer;
    transition:background 0.2s, transform 0.2s;
    margin-top:6px;
  }

  .btn-fill:hover{background:var(--orange-light); transform:translateY(-1px);}

  /* ── MESSAGE ── */
  .msg-box{
    margin-top:20px;
    background:var(--blue);
    border-left:4px solid var(--orange);
    border-radius:10px;
    padding:14px 18px;
    font-weight:700;
    color:var(--ink);
  }

  .msg-box a{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    background:var(--orange);
    color:#fff;
    font-weight:800;
    font-size:0.85rem;
    padding:8px 18px;
    border-radius:20px;
  }

  .msg-box a:hover{background:var(--orange-light);}

  @media (max-width:500px){
    .topbar{padding:10px 18px;}
    .wrap{padding:24px 16px 30px;}
    .card{padding:22px 20px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark">SF</div>
    Student Fees Management
  </div>
  <nav>
    <a href="../studenthome/">← Dashboard</a>
  </nav>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-head">
      <div class="ic">🔑</div>
      <h1>Change Password</h1>
    </div>

    {% if data %}
      {% for d in data %}
        <div class="email-tag">{{d.email}}</div>

        <form action="../change_student_password1/" method="post">
          {% csrf_token %}
          <input type="hidden" name="H1" value="{{d.email}}">
          <div class="field-group">
            <label for="T1">New Password</label>
            <input type="password" name="T1" id="T1">
          </div>
          <div class="field-group">
            <label for="T2">Confirm Password</label>
            <input type="password" name="T2" id="T2">
          </div>
          <button type="submit" class="btn-fill">Change Password</button>
        </form>
      {% endfor %}
    {% elif msg %}
      <div class="msg-box">
        {{msg}}<br>
        <a href="../studenthome/">Dashboard</a>
      </div>
    {% endif %}
  </div>
</div>

</body>
</html>
