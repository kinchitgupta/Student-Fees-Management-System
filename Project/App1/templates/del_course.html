<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Course | Student Fees Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2a3f;
  --red:#c0392b;
  --red-bg:#fdecea;
  --red-border:#f3c6c0;
  --red-dark:#a5301f;
  --accent:#15a374;
  --bg:#f6f8f7;
  --surface:#ffffff;
  --surface-tint:#f1f7f4;
  --ink:#16201c;
  --muted:#7c8a82;
  --border:#e3e9e5;
  --font-head:'Plus Jakarta Sans', 'Segoe UI', sans-serif;
  --font-body:'Inter', 'Segoe UI', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  -webkit-font-smoothing:antialiased;
}

h1{ font-family:var(--font-head); }

.page-card{
  width:100%;
  max-width:480px;
  background:var(--surface);
  border-radius:20px;
  box-shadow:0 24px 60px rgba(15,42,63,0.14), 0 2px 8px rgba(15,42,63,0.06);
  border:1px solid rgba(15,42,63,0.05);
  padding:38px 40px;
}

.page-card h1{
  font-size:1.4rem;
  font-weight:800;
  color:var(--navy);
  letter-spacing:-0.2px;
  margin-bottom:4px;
}

.page-card .sub{
  font-size:0.86rem;
  color:var(--muted);
  margin-bottom:24px;
}

.divider{
  height:1px;
  background:var(--border);
  margin:0 0 22px;
}

.detail-card{
  background:var(--surface-tint);
  border:1px solid var(--border);
  border-left:3px solid var(--red);
  border-radius:12px;
  padding:18px 20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:26px;
}

.detail-row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  font-size:0.88rem;
}

.detail-row .d-label{
  font-size:0.64rem;
  text-transform:uppercase;
  letter-spacing:0.8px;
  color:var(--muted);
  font-weight:700;
}

.detail-row .d-value{
  font-weight:700;
  font-family:var(--font-head);
  color:var(--ink);
  text-align:right;
  word-break:break-word;
}

.form-actions{
  display:flex;
  align-items:center;
  gap:14px;
  margin-top:22px;
}

.btn-secondary{
  border:1px solid var(--border);
  background:#fff;
  color:var(--navy);
  padding:11px 26px;
  border-radius:9px;
  font-family:var(--font-head);
  font-weight:600;
  font-size:0.88rem;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.btn-secondary:hover{
  background:var(--surface-tint);
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(15,42,63,0.1);
}

.btn-danger{
  border:1px solid var(--red-border);
  background:var(--red-bg);
  color:var(--red);
  padding:11px 26px;
  border-radius:9px;
  font-family:var(--font-head);
  font-weight:600;
  font-size:0.88rem;
  cursor:pointer;
  transition:background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.btn-danger:hover{
  background:#fbdbd7;
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(192,57,43,0.18);
}

.btn-link{
  color:var(--muted);
  text-decoration:none;
  font-weight:700;
  font-size:0.84rem;
}
.btn-link:hover{ color:var(--ink); }

.msg-banner{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--surface-tint);
  border:1px solid var(--accent);
  color:var(--ink);
  font-weight:600;
  font-size:0.9rem;
  padding:14px 16px;
  border-radius:10px;
}
.msg-banner::before{
  content:"";
  width:8px; height:8px;
  border-radius:50%;
  background:var(--accent);
  flex-shrink:0;
}

@media (max-width:600px){
  .page-card{ padding:28px 24px; }
}
</style>
</head>
<body>

<div class="page-card">
  <h1>Delete Course</h1>
  <p class="sub">Please confirm the course details before deleting.</p>
  <div class="divider"></div>

  {% if data %}
    <div class="detail-card">
      <div class="detail-row">
        <span class="d-label">Name</span>
        <span class="d-value">{{ data.course_name }}</span>
      </div>
      <div class="detail-row">
        <span class="d-label">Price</span>
        <span class="d-value">{{ data.cost }}</span>
      </div>
      <div class="detail-row">
        <span class="d-label">Duration</span>
        <span class="d-value">{{ data.duration }}</span>
      </div>
      <div class="detail-row">
        <span class="d-label">Description</span>
        <span class="d-value">{{ data.description }}</span>
      </div>
    </div>

    <form action="../del_course1/" method="post">
      {% csrf_token %}
      <input type="hidden" name="H1" value="{{ data.course_name }}">
      <div class="form-actions">
        <input type="submit" class="btn-danger" value="Confirm Delete">
        <a class="btn-link" href="../show_course/">Cancel</a>
      </div>
    </form>
  {% elif msg %}
    <div class="msg-banner">{{ msg }}</div>
    <div class="form-actions">
      <a class="btn-secondary" href="../show_course/">Back</a>
    </div>
  {% endif %}
</div>

</body>
</html>
